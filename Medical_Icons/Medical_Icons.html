<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Medical Icons</title>
    <meta name="description" content="An Icon Font Generated By FALAH FATHEL using IcoMoon.io">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="demo-files/demo.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f6f8fc;
            color: #1e293b;
            padding: 24px;
        }
        .app {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: linear-gradient(135deg, #0b2b4a 0%, #1a4a6e 100%);
            border-radius: 20px;
            padding: 32px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(11, 43, 74, 0.25);
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .header h1 small {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.12);
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0;
        }
        .header .badge {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            background: rgba(255, 255, 255, 0.10);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .search-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            flex: 1 1 320px;
            max-width: 480px;
            transition: box-shadow 0.2s;
        }
        .search-wrap:focus-within {
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
        }
        .search-wrap svg {
            flex-shrink: 0;
            opacity: 0.5;
        }
        .search-wrap input {
            border: none;
            outline: none;
            background: transparent;
            padding: 14px 0;
            font-size: 15px;
            width: 100%;
            color: #1e293b;
            font-weight: 450;
        }
        .search-wrap input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
        .search-wrap .clear-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px 16px 8px 4px;
            display: none;
            transition: color 0.15s;
            line-height: 1;
        }
        .search-wrap .clear-btn:hover {
            color: #1e293b;
        }
        .search-wrap .clear-btn.visible {
            display: block;
        }
        .stats {
            font-size: 14px;
            color: #64748b;
            padding: 0 4px 12px 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stats span {
            font-weight: 600;
            color: #0b2b4a;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin-bottom: 40px;
        }
        .glyph-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px 8px 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s, box-shadow 0.25s, background 0.2s;
            border: 1px solid rgba(0, 0, 0, 0.03);
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .glyph-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            background: #ffffff;
            border-color: rgba(11, 43, 74, 0.10);
        }
        .glyph-card .icon-wrap {
            font-size: 40px;
            line-height: 1.2;
            color: #0b2b4a;
            margin-bottom: 6px;
            transition: transform 0.2s;
        }
        .glyph-card:hover .icon-wrap {
            transform: scale(1.06);
        }
        .glyph-card .glyph-name {
            font-size: 11px;
            font-weight: 500;
            color: #475569;
            word-break: break-word;
            line-height: 1.3;
            max-width: 100%;
            padding: 0 2px;
            letter-spacing: 0.01em;
        }
        .glyph-card .glyph-code {
            font-size: 10px;
            font-weight: 400;
            color: #94a3b8;
            margin-top: 4px;
            font-family: "SF Mono", "Fira Code", monospace;
            background: #f1f5f9;
            padding: 2px 10px;
            border-radius: 12px;
            letter-spacing: 0.02em;
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 16px;
            background: #fff;
            border-radius: 20px;
            border: 1px dashed #e2e8f0;
        }
        .no-results strong {
            color: #475569;
        }
        .test-drive {
            background: #fff;
            border-radius: 20px;
            padding: 32px 36px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.03);
            margin-bottom: 28px;
        }
        .test-drive h2 {
            font-size: 18px;
            font-weight: 600;
            color: #0b2b4a;
            margin-bottom: 18px;
        }
        .test-drive .row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
        }
        .test-drive .row label {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .test-drive .row input[type="number"] {
            width: 72px;
            padding: 8px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: border 0.15s;
            background: #f8fafc;
        }
        .test-drive .row input[type="number"]:focus {
            border-color: #1a4a6e;
            background: #fff;
        }
        .test-drive .row input[type="text"] {
            flex: 1 1 240px;
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border 0.15s;
            background: #f8fafc;
            min-width: 160px;
        }
        .test-drive .row input[type="text"]:focus {
            border-color: #1a4a6e;
            background: #fff;
        }
        .test-drive .preview {
            margin-top: 18px;
            padding: 24px 20px;
            background: #f8fafc;
            border-radius: 14px;
            border: 1px solid #eef2f6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #0b2b4a;
            transition: font-size 0.15s;
            word-break: break-all;
            text-align: center;
            font-family: Medical_icons, sans-serif;
        }
        .test-drive .preview:empty::before {
            content: "Your icon will appear here";
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            color: #94a3b8;
            font-weight: 400;
        }
        .footer {
            text-align: center;
            padding: 16px 0 4px;
            font-size: 13px;
            color: #94a3b8;
        }
        .footer a {
            color: #1a4a6e;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 700px) {
            body {
                padding: 12px;
            }
            .header {
                padding: 24px 20px;
                flex-direction: column;
                align-items: stretch;
                gap: 14px;
            }
            .header h1 {
                font-size: 20px;
            }
            .header h1 small {
                font-size: 14px;
            }
            .search-wrap {
                flex: 1 1 auto;
                max-width: 100%;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 8px;
            }
            .glyph-card {
                padding: 14px 4px 10px;
            }
            .glyph-card .icon-wrap {
                font-size: 32px;
            }
            .test-drive {
                padding: 20px 16px;
            }
            .test-drive .row {
                flex-direction: column;
                align-items: stretch;
            }
        }
        @media (max-width: 420px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
            .glyph-card .glyph-name {
                font-size: 9px;
            }
            .glyph-card .icon-wrap {
                font-size: 28px;
            }
            .glyph-card .glyph-code {
                font-size: 8px;
                padding: 1px 6px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <h1>
                Medical Icons
                <small>Glyphs: 84</small>
            </h1>
            <div class="search-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search icons…" autofocus>
                <button class="clear-btn" id="clearBtn" aria-label="Clear search">✕</button>
            </div>
        </header>
        <div class="stats">
            Showing <span id="visibleCount">84</span> of <span>84</span> icons
        </div>
        <div class="grid" id="glyphGrid"></div>
        <section class="test-drive">
            <h2>Test Drive</h2>
            <div class="row">
                <label>
                    Font Size
                    <input type="number" id="fontSize" min="8" value="48"> px
                </label>
                <label>
                    <input type="text" id="testText" placeholder="Type any icon class…" value="">
                </label>
            </div>
            <div class="preview" id="testDrive" style="font-family: Medical_icons;">&#xe900;</div>
        </section>
        <div class="footer">
            Generated by <a href="https://github.com/FALCONZeroX" target="_blank">FALAH FATHEL</a>
        </div>
    </div>
    <script>
        (function() {
            var glyphs = [
                { name: "icon-atom-line", code: "e900" },
                { name: "icon-aed-electrodes-fill", code: "e901" },
                { name: "icon-aed-electrodes-line", code: "e902" },
                { name: "icon-aed-fill", code: "e903" },
                { name: "icon-aed-line", code: "e904" },
                { name: "icon-atom-fill", code: "e905" },
                { name: "icon-brain-2-fill", code: "e906" },
                { name: "icon-brain-2-line", code: "e907" },
                { name: "icon-brain-3-fill", code: "e908" },
                { name: "icon-brain-3-line", code: "e909" },
                { name: "icon-brain-4-fill", code: "e90a" },
                { name: "icon-brain-4-line", code: "e90b" },
                { name: "icon-brain-ai-3-fill", code: "e90c" },
                { name: "icon-brain-ai-3-line", code: "e90d" },
                { name: "icon-brain-fill", code: "e90e" },
                { name: "icon-brain-line", code: "e90f" },
                { name: "icon-capsule-fill", code: "e910" },
                { name: "icon-capsule-line", code: "e911" },
                { name: "icon-dislike-fill", code: "e912" },
                { name: "icon-dislike-line", code: "e913" },
                { name: "icon-dna-fill", code: "e914" },
                { name: "icon-dna-line", code: "e915" },
                { name: "icon-dossier-fill", code: "e916" },
                { name: "icon-dossier-line", code: "e917" },
                { name: "icon-dropper-fill", code: "e918" },
                { name: "icon-dropper-line", code: "e919" },
                { name: "icon-empathize-fill", code: "e91a" },
                { name: "icon-empathize-line", code: "e91b" },
                { name: "icon-first-aid-kit-fill", code: "e91c" },
                { name: "icon-first-aid-kit-line", code: "e91d" },
                { name: "icon-flask-fill", code: "e91e" },
                { name: "icon-flask-line", code: "e91f" },
                { name: "icon-hand-sanitizer-fill", code: "e920" },
                { name: "icon-hand-sanitizer-line", code: "e921" },
                { name: "icon-health-book-fill", code: "e922" },
                { name: "icon-health-book-line", code: "e923" },
                { name: "icon-heart-2-fill", code: "e924" },
                { name: "icon-heart-2-line", code: "e925" },
                { name: "icon-heart-3-fill", code: "e926" },
                { name: "icon-heart-3-line", code: "e927" },
                { name: "icon-heart-add-2-fill", code: "e928" },
                { name: "icon-heart-add-2-line", code: "e929" },
                { name: "icon-heart-add-fill", code: "e92a" },
                { name: "icon-heart-add-line", code: "e92b" },
                { name: "icon-heart-fill", code: "e92c" },
                { name: "icon-heart-line", code: "e92d" },
                { name: "icon-heart-pulse-fill", code: "e92e" },
                { name: "icon-heart-pulse-line", code: "e92f" },
                { name: "icon-hearts-fill", code: "e930" },
                { name: "icon-hearts-line", code: "e931" },
                { name: "icon-infrared-thermometer-fill", code: "e932" },
                { name: "icon-infrared-thermometer-line", code: "e933" },
                { name: "icon-lungs-fill", code: "e934" },
                { name: "icon-lungs-line", code: "e935" },
                { name: "icon-medicine-bottle-fill", code: "e936" },
                { name: "icon-medicine-bottle-line", code: "e937" },
                { name: "icon-mental-health-fill", code: "e938" },
                { name: "icon-mental-health-line", code: "e939" },
                { name: "icon-microscope-fill", code: "e93a" },
                { name: "icon-microscope-line", code: "e93b" },
                { name: "icon-nurse-fill", code: "e93c" },
                { name: "icon-nurse-line", code: "e93d" },
                { name: "icon-psychotherapy-fill", code: "e93e" },
                { name: "icon-psychotherapy-line", code: "e93f" },
                { name: "icon-pulse-ai-fill", code: "e940" },
                { name: "icon-pulse-ai-line", code: "e941" },
                { name: "icon-pulse-fill", code: "e942" },
                { name: "icon-pulse-line", code: "e943" },
                { name: "icon-rest-time-fill", code: "e944" },
                { name: "icon-rest-time-line", code: "e945" },
                { name: "icon-stethoscope-fill", code: "e946" },
                { name: "icon-stethoscope-line", code: "e947" },
                { name: "icon-surgical-mask-fill", code: "e948" },
                { name: "icon-surgical-mask-line", code: "e949" },
                { name: "icon-syringe-fill", code: "e94a" },
                { name: "icon-syringe-line", code: "e94b" },
                { name: "icon-test-tube-fill", code: "e94c" },
                { name: "icon-test-tube-line", code: "e94d" },
                { name: "icon-thermometer-fill", code: "e94e" },
                { name: "icon-thermometer-line", code: "e94f" },
                { name: "icon-virus-fill", code: "e950" },
                { name: "icon-virus-line", code: "e951" },
                { name: "icon-zzz-fill", code: "e952" },
                { name: "icon-zzz-line", code: "e953" }
            ];

            var grid = document.getElementById('glyphGrid');
            var searchInput = document.getElementById('searchInput');
            var clearBtn = document.getElementById('clearBtn');
            var visibleCount = document.getElementById('visibleCount');
            var totalCount = document.getElementById('visibleCount').nextElementSibling || document.querySelector('.stats span:last-child');
            var fontSizeInput = document.getElementById('fontSize');
            var testTextInput = document.getElementById('testText');
            var testDrive = document.getElementById('testDrive');

            function renderGlyphs(filter) {
                var q = (filter || '').trim().toLowerCase();
                var html = '';
                var count = 0;
                for (var i = 0; i < glyphs.length; i++) {
                    var g = glyphs[i];
                    var match = g.name.toLowerCase().indexOf(q) !== -1;
                    if (q && !match) continue;
                    count++;
                    var hex = '&#x' + g.code + ';';
                    html += '<div class="glyph-card">';
                    html += '<div class="icon-wrap">' + hex + '</div>';
                    html += '<div class="glyph-name">' + g.name + '</div>';
                    html += '<div class="glyph-code">' + g.code + '</div>';
                    html += '</div>';
                }
                if (count === 0) {
                    html = '<div class="no-results">No icons match <strong>“' + q + '”</strong></div>';
                }
                grid.innerHTML = html;
                visibleCount.textContent = count;
                if (totalCount && totalCount.tagName === 'SPAN') {
                    totalCount.textContent = glyphs.length;
                }
                clearBtn.classList.toggle('visible', q.length > 0);
            }

            function updateTestDrive() {
                var size = parseInt(fontSizeInput.value, 10) || 48;
                var val = testTextInput.value.trim();
                testDrive.style.fontSize = size + 'px';
                if (val) {
                    var found = false;
                    for (var i = 0; i < glyphs.length; i++) {
                        if (glyphs[i].name === val) {
                            testDrive.innerHTML = '&#x' + glyphs[i].code + ';';
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        var clean = val.replace(/^icon-/, '');
                        for (var j = 0; j < glyphs.length; j++) {
                            if (glyphs[j].name === 'icon-' + clean) {
                                testDrive.innerHTML = '&#x' + glyphs[j].code + ';';
                                found = true;
                                break;
                            }
                        }
                        if (!found) {
                            testDrive.innerHTML = '';
                        }
                    }
                } else {
                    testDrive.innerHTML = '&#xe900;';
                }
            }

            searchInput.addEventListener('input', function() {
                renderGlyphs(this.value);
            });

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                renderGlyphs('');
                searchInput.focus();
            });

            fontSizeInput.addEventListener('input', updateTestDrive);
            testTextInput.addEventListener('input', updateTestDrive);

            renderGlyphs('');
            updateTestDrive();

            document.addEventListener('click', function(e) {
                var card = e.target.closest('.glyph-card');
                if (card) {
                    var nameEl = card.querySelector('.glyph-name');
                    if (nameEl) {
                        testTextInput.value = nameEl.textContent;
                        updateTestDrive();
                    }
                }
            });

        })();
    </script>
    <script src="demo-files/demo.js"></script>
</body>
</html>
