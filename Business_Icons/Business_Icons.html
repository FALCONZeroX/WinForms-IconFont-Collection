<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Business Icons</title>
    <meta name="description" content="Business Icons Set by FALAH FATHEL using IcoMoon">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="demo-files/demo.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fc;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: #1e293b;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 1360px;
            margin: 0 auto;
        }
        .header {
            background: #ffffff;
            border-radius: 28px;
            padding: 2rem 2.5rem;
            box-shadow: 0 10px 30px -8px rgba(0, 20, 50, 0.08);
            margin-bottom: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(226, 232, 240, 0.6);
        }
        .header h1 {
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
            color: #0b1e3a;
        }
        .header h1 small {
            font-weight: 400;
            font-size: 1.1rem;
            color: #5b6e8e;
            margin-left: 0.75rem;
            background: #eef2f8;
            padding: 0.15rem 1rem;
            border-radius: 40px;
        }
        .search-wrap {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: #f1f5f9;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }
        .search-wrap:focus-within {
            background: #ffffff;
            border-color: #3b7cff;
            box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.15);
        }
        .search-wrap i {
            color: #64748b;
            font-size: 1.1rem;
        }
        .search-wrap input {
            border: none;
            background: transparent;
            padding: 0.85rem 0.5rem 0.85rem 0;
            font-size: 1rem;
            width: 230px;
            outline: none;
            color: #0f1e3a;
        }
        .search-wrap input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }
        .search-wrap .clear-btn {
            background: #e2e8f0;
            border: none;
            border-radius: 40px;
            width: 34px;
            height: 34px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #334155;
            display: none;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            margin-right: 4px;
        }
        .search-wrap .clear-btn.visible {
            display: flex;
        }
        .search-wrap .clear-btn:hover {
            background: #cbd5e1;
        }
        .stats {
            font-size: 0.95rem;
            color: #475569;
            background: #f8fafc;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            border: 1px solid #e9edf3;
        }
        .grid-container {
            background: #ffffff;
            border-radius: 28px;
            padding: 2rem 1.8rem 2.5rem;
            box-shadow: 0 12px 32px -10px rgba(0, 20, 40, 0.06);
            border: 1px solid #eef2f8;
        }
        .grid-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .grid-header h2 {
            font-weight: 500;
            font-size: 1.25rem;
            color: #1e2f4a;
            letter-spacing: -0.01em;
        }
        .grid-header .count-badge {
            background: #eef2f8;
            padding: 0.25rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #3a4c6b;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.75rem;
        }
        .icon-card {
            background: #fafcff;
            border-radius: 18px;
            padding: 1.2rem 0.3rem 0.9rem;
            text-align: center;
            transition: 0.15s;
            border: 1px solid transparent;
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #eef3f9;
        }
        .icon-card:hover {
            background: #ffffff;
            border-color: #cbd9ec;
            box-shadow: 0 6px 14px rgba(0, 20, 40, 0.04);
            transform: translateY(-2px);
        }
        .icon-card .icon-preview {
            font-size: 2.1rem;
            line-height: 1.2;
            margin-bottom: 0.5rem;
            color: #0b1e3a;
        }
        .icon-card .icon-name {
            font-size: 0.7rem;
            font-weight: 450;
            color: #2d405b;
            background: #eef4fc;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            max-width: 95%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            letter-spacing: 0.01em;
        }
        .icon-card .icon-code {
            font-size: 0.6rem;
            color: #657b9c;
            background: #e9eef6;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            margin-top: 0.3rem;
            font-family: 'SF Mono', monospace;
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 0;
            color: #5a6f8e;
            font-size: 1.1rem;
            background: #f8faff;
            border-radius: 30px;
            border: 1px dashed #d9e1ed;
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            color: #68748e;
            font-size: 0.9rem;
            border-top: 1px solid #e2eaf2;
            padding-top: 2rem;
        }
        .footer a {
            color: #2b4b7a;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 700px) {
            body { padding: 0.8rem; }
            .header { flex-direction: column; align-items: stretch; gap: 1rem; padding: 1.5rem; }
            .header h1 { font-size: 1.5rem; }
            .search-wrap input { width: 100%; }
            .grid-container { padding: 1rem 0.8rem; }
            .icon-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
        }
        .test-drive {
            margin-top: 2.8rem;
            background: #f8faff;
            border-radius: 24px;
            padding: 1.8rem 2rem;
            border: 1px solid #e7eef8;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1.2rem 2rem;
        }
        .test-drive label {
            font-weight: 450;
            color: #2d3f5a;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .test-drive input[type="number"] {
            width: 70px;
            padding: 0.4rem 0.5rem;
            border: 1px solid #d2deed;
            border-radius: 40px;
            background: white;
            font-weight: 500;
            text-align: center;
        }
        .test-drive input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 0.6rem 1.2rem;
            border: 1px solid #d2deed;
            border-radius: 40px;
            background: white;
            font-size: 1rem;
        }
        #testDrive {
            font-size: 2.6rem;
            padding: 0.3rem 0.2rem;
            min-height: 60px;
            color: #13273f;
            letter-spacing: 2px;
            width: 100%;
            border-top: 1px solid #dce5f0;
            padding-top: 1.2rem;
            margin-top: 0.4rem;
            word-break: break-all;
        }
    </style>
</head>

    <div class="header">
        <h1>
            Business Icons
            <small>220 glyphs</small>
        </h1>
        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
            <div class="search-wrap">

                <input type="text" id="searchInput" placeholder="Search icon...">
                <button class="clear-btn" id="clearBtn" aria-label="Clear">✕</button>
            </div>
            <span class="stats" id="visibleCount">220 / 220</span>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid-header">
            <h2>All icons</h2>
            <span class="count-badge" id="resultCount">220 icons</span>
        </div>
        <div class="icon-grid" id="iconGrid"></div>
    </div>

    <div class="test-drive">
        <label>Size <input type="number" id="fontSize" min="8" value="48"> px</label>
        <input type="text" id="testText" placeholder="Type to preview...">
        <div id="testDrive" style="font-family: Business_icons;">&nbsp;</div>
    </div>

    <div class="footer">
        Generated by <a href="https://github.com/FALCONZeroX" target="_blank">FALAH FATHEL</a> &bull; Business edition

</div>

            let html = '';
            let matched = 0;
            for (const g of glyphs) {
                const match = g.name.includes(q) || g.code.includes(q);
                if (match) matched++;
                const display = match ? 'block' : 'none';
                html += `<div class="icon-card" style="display:${display}" data-name="${g.name}" data-code="${g.code}">

                    <div class="icon-name">${g.name}</div>
                    <div class="icon-code">${g.code}</div>
                </div>`;

            grid.innerHTML = html;
            const total = glyphs.length;
            visibleCount.textContent = `${matched} / ${total}`;
            resultCount.textContent = `${matched} icon${matched !== 1 ? 's' : ''}`;

            if (matched === 0 && q.length > 0) {
                grid.innerHTML += `<div class="no-results">No icons found for “${q}”</div>`;
            }
        }

            render('');

        });

            testDrive.textContent = this.value || '\u00a0';
        });

        // Init
        render('');
        testDrive.textContent = '\u00a0';
