<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Users Icons</title>
    <meta name="description" content="An Icon Font Generated By FALAH FATHEL using IcoMoon.io">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="demo-files/demo.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #f7f9fc;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .bgc1 {
            background: #f0f2f5;
        }
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
        .mhl {
            margin-left: 20px;
            margin-right: 20px;
        }
        .mvl {
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            padding: 20px 0 10px;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            color: #1a1a2e;
        }
        .header h1 small {
            font-size: 18px;
            font-weight: 400;
            color: #6c757d;
            margin-left: 8px;
        }
        .search-section {
            margin: 20px 0 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px;
        }
        .search-box {
            flex: 1 1 300px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #dce1e8;
            border-radius: 40px;
            font-size: 16px;
            background: #fff;
            transition: 0.25s;
            outline: none;
        }
        .search-box input:focus {
            border-color: #3b7cff;
            box-shadow: 0 0 0 4px rgba(59, 124, 255, 0.15);
        }
        .stats {
            font-size: 15px;
            color: #495057;
            background: #fff;
            padding: 6px 18px;
            border-radius: 30px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            white-space: nowrap;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 18px;
            margin: 24px 0 40px;
        }
        .glyph-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 18px 8px 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #e9edf4;
            transition: 0.2s ease;
            cursor: default;
        }
        .glyph-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            transform: translateY(-3px);
            border-color: #cbd5e1;
        }
        .glyph-card .icon {
            font-size: 40px;
            display: block;
            line-height: 1.2;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .glyph-card .name {
            font-size: 12px;
            font-weight: 500;
            color: #212529;
            word-break: break-word;
            line-height: 1.3;
            margin-bottom: 4px;
        }
        .glyph-card .code {
            font-size: 11px;
            color: #868e96;
            font-family: "SF Mono", "Menlo", monospace;
            background: #f1f3f5;
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
        }
        .hidden {
            display: none !important;
        }
        .test-drive {
            background: #fff;
            border-radius: 16px;
            padding: 28px 24px;
            margin: 30px 0 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            border: 1px solid #e9edf4;
        }
        .test-drive h2 {
            margin-top: 0;
            font-size: 22px;
            font-weight: 600;
        }
        .test-drive label {
            font-weight: 500;
            margin-right: 12px;
        }
        .test-drive input[type="number"] {
            width: 80px;
            padding: 8px 12px;
            border: 1px solid #dce1e8;
            border-radius: 8px;
            font-size: 15px;
        }
        .test-drive input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dce1e8;
            border-radius: 8px;
            font-size: 16px;
            margin: 12px 0;
        }
        #testDrive {
            font-size: 48px;
            min-height: 80px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 1px dashed #ced4da;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }
        .footer {
            padding: 20px 0;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            border-top: 1px solid #e9edf4;
            margin-top: 20px;
        }
        .footer a {
            color: #3b7cff;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .icon-::before {
            font-family: 'Users_icons' !important;
        }
        .glyph-card .icon[class^="icon-"]::before,
        .glyph-card .icon[class*=" icon-"]::before {
            font-family: 'Users_icons' !important;
        }
        @media (max-width: 600px) {
            .header h1 {
                font-size: 22px;
            }
            .header h1 small {
                font-size: 15px;
            }
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            .glyph-card .icon {
                font-size: 32px;
            }
            .search-section {
                flex-direction: column;
                align-items: stretch;
            }
            .stats {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>

    <div class="bgc1 clearfix">
        <div class="container">
            <div class="header">
                <h1><span class="fgc1">Font Name:</span> Users_icons <small>(Glyphs:&nbsp;<span id="totalGlyphs">0</span>)</small></h1>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search icons by name..." autofocus>
            </div>
            <div class="stats" id="stats">Showing <span id="shownCount">0</span> of <span id="totalCount">0</span></div>
        </div>
        <div class="grid" id="iconGrid"></div>
    </div>

    <div class="container">
        <div class="test-drive">
            <h2>Font Test Drive</h2>
            <label>
                Font Size:
                <input id="fontSize" type="number" min="8" value="48"> px
            </label>
            <input id="testText" type="text" placeholder="Type some text to test..." value="">
            <div id="testDrive" class="icon-" style="font-family: 'Users_icons';">&nbsp;</div>
        </div>
    </div>

    <div class="bgc1 clearfix footer">
        <p class="mhl">Generated by <a href="https://github.com/FALCONZeroX">FALAH FATHEL</a></p>
    </div>

    <script src="demo-files/demo.js"></script>

        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('iconGrid');
            const searchInput = document.getElementById('searchInput');
            const shownSpan = document.getElementById('shownCount');
            const totalSpan = document.getElementById('totalCount');
            const totalGlyphsSpan = document.getElementById('totalGlyphs');

            totalSpan.textContent = icons.length;
            totalGlyphsSpan.textContent = icons.length;

            function renderIcons(filter = '') {
                grid.innerHTML = '';
                const lowerFilter = filter.toLowerCase().trim();
                const filtered = lowerFilter === '' ?
                    icons :
                    icons.filter(icon => icon.name.toLowerCase().includes(lowerFilter));

                shownSpan.textContent = filtered.length;

                if (filtered.length === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.style.cssText =
                        'grid-column:1/-1; text-align:center; padding:40px 0; color:#6c757d; font-size:18px;';
                    emptyMsg.textContent = 'No icons found matching "' + filter + '"';
                    grid.appendChild(emptyMsg);
                    return;
                }

                filtered.forEach(icon => {
                    const card = document.createElement('div');
                    card.className = 'glyph-card';
                    card.innerHTML =
                        `<span class="icon icon-${icon.name}"></span><div class="name">icon-${icon.name}</div><div class="code">${icon.code}</div>`;
                    grid.appendChild(card);
                });
            }

            function filterIcons() {
                renderIcons(searchInput.value);
            }

            searchInput.addEventListener('input', filterIcons);
            renderIcons('');

            // Test drive functionality (keep original behavior)
            const fontSizeInput = document.getElementById('fontSize');
            const testTextInput = document.getElementById('testText');
            const testDrive = document.getElementById('testDrive');

            function updateTestDrive() {
                const size = parseInt(fontSizeInput.value, 10) || 48;
                testDrive.style.fontSize = size + 'px';
                const text = testTextInput.value || ' ';
                testDrive.textContent = text;
            }

            fontSizeInput.addEventListener('input', updateTestDrive);
            testTextInput.addEventListener('input', updateTestDrive);
            updateTestDrive();
        });

</body>
</html>
