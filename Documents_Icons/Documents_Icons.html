    <meta charset="utf-8">
    <title>Documents Icons</title>

    <link rel="stylesheet" href="demo-files/demo.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background: #f5f7fa;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 24px 16px;
            color: #1e293b;
        }
        .demo-wrapper {
            max-width: 1440px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
            padding: 32px 28px;
            transition: all 0.2s;
        }
        .header-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 28px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 18px;
        }
        .header-bar h1 {
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
            margin: 0;
            color: #0f172a;
        }
        .header-bar h1 small {
            font-weight: 400;
            font-size: 1rem;
            color: #64748b;
            margin-left: 12px;
        }
        .header-bar .badge {
            background: #eef2ff;
            color: #4338ca;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .search-area {
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-area label {
            font-weight: 500;
            color: #334155;
            font-size: 0.9rem;
        }
        .search-area input {
            flex: 1;
            min-width: 200px;
            padding: 12px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            background: #f8fafc;
            transition: 0.2s;
            outline: none;
            color: #0f172a;
        }
        .search-area input:focus {
            border-color: #6366f1;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }
        .search-area .clear-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.3rem;
            padding: 0 8px;
            transition: 0.2s;
        }
        .search-area .clear-btn:hover {
            color: #475569;
        }
        .search-stats {
            font-size: 0.85rem;
            color: #64748b;
            margin-left: auto;
            white-space: nowrap;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }
        .glyph-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 12px 14px;
            border: 1px solid #f0f2f5;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }
        .glyph-card:hover {
            border-color: #d0d5dd;
            background: #fafcff;
            box-shadow: 0 8px 18px rgba(0,0,0,0.04);
            transform: translateY(-2px);
        }
        .glyph-card .icon-box {
            font-size: 2.2rem;
            line-height: 1.3;
            color: #0f172a;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 58px;
            width: 100%;
        }
        .glyph-card .icon-name {
            font-size: 0.7rem;
            font-weight: 450;
            color: #334155;
            background: #f1f4f9;
            padding: 4px 12px;
            border-radius: 40px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            word-break: keep-all;
        }
        .glyph-card .icon-code {
            font-size: 0.6rem;
            color: #94a3b8;
            margin-top: 6px;
            font-family: 'Menlo', 'Monaco', monospace;
            background: #f8fafc;
            padding: 2px 12px;
            border-radius: 30px;
            letter-spacing: 0.3px;
        }
        .glyph-card.hidden {
            display: none;
        }
        .test-drive {
            margin-top: 44px;
            border-top: 2px solid #f1f5f9;
            padding-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 24px 32px;
            align-items: center;
        }
        .test-drive h2 {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 0;
            color: #1e293b;
        }
        .test-drive .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .test-drive input[type="number"] {
            width: 80px;
            padding: 8px 10px;
            border: 1.5px solid #e2e8f0;
            border-radius: 40px;
            background: #f8fafc;
            font-size: 0.95rem;
            text-align: center;
        }
        .test-drive input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 10px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            background: #f8fafc;
            font-size: 1rem;
        }
        .test-drive .preview-box {
            font-size: 2.4rem;
            padding: 12px 28px;
            background: #f8fafc;
            border-radius: 60px;
            min-width: 120px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #d4d9e2;
            color: #0f172a;
            font-family: 'Documents_icons', sans-serif;
            letter-spacing: 2px;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.8rem;
            border-top: 1px solid #eef2f6;
            padding-top: 24px;
        }
        .footer a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 500;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .demo-wrapper { padding: 20px 12px; }
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .header-bar h1 { font-size: 1.4rem; }
        }

        <div class="header-bar">
            <h1>
                📄 Documents Icons
                <small>Glyphs: 244</small>
            </h1>
            <span class="badge">✦ icon font</span>
        </div>

        <div class="search-area">
            <label for="searchIcons">🔍 Search</label>
            <input type="text" id="searchIcons" placeholder="Type icon name…" autocomplete="off">
            <button class="clear-btn" id="clearSearch" aria-label="Clear search">✕</button>
            <span class="search-stats" id="resultCount">244 icons</span>
        </div>

        <div class="grid-container" id="iconGrid">
        </div>

        <div class="test-drive">
            <h2>⌨️ Test drive</h2>
            <div class="control-group">
                <label>Size
                    <input type="number" id="fontSize" value="48" min="8" step="1">
                    px
                </label>
                <input type="text" id="testText" placeholder="Type to preview…" value="">
            </div>
            <div class="preview-box" id="testDrive" style="font-family: 'Documents_icons';">&nbsp;</div>
        </div>

        <div class="footer">
            Generated with <a href="https://github.com/FALCONZeroX">FALAH FATHEL</a> · Documents Icons
        </div>
    </div>

            const grid = document.getElementById('iconGrid');
            const searchInput = document.getElementById('searchIcons');
            const clearBtn = document.getElementById('clearSearch');
            const resultSpan = document.getElementById('resultCount');
            const testDrive = document.getElementById('testDrive');
            const fontSizeInput = document.getElementById('fontSize');
            const testTextInput = document.getElementById('testText');

            function renderIcons(filter = '') {
                const q = filter.trim().toLowerCase();
                let visibleCount = 0;
                let html = '';
                for (const [name, code] of GLYPHS) {
                    const match = q === '' || name.toLowerCase().includes(q);
                    if (match) visibleCount++;
                    const cls = match ? '' : 'hidden';
                    const unicode = `&#x${code};`;
                    html += `<div class="glyph-card ${cls}" data-name="${name}" data-code="${code}">
                        <div class="icon-box">${unicode}</div>
                        <div class="icon-name">${name}</div>
                        <div class="icon-code">${code}</div>
                    </div>`;
                }
                grid.innerHTML = html;
                resultSpan.textContent = `${visibleCount} icon${visibleCount !== 1 ? 's' : ''}`;
            }

            function updateTestDrive() {
                const size = parseInt(fontSizeInput.value, 10) || 48;
                const text = testTextInput.value || ' ';
                testDrive.style.fontSize = size + 'px';
                testDrive.textContent = text;
            }

            searchInput.addEventListener('input', function() {
                renderIcons(this.value);
            });

            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                renderIcons('');
                searchInput.focus();
            });

            fontSizeInput.addEventListener('input', updateTestDrive);
            testTextInput.addEventListener('input', updateTestDrive);

            renderIcons('');
            updateTestDrive();

            window.addEventListener('load', function() {
                if (testDrive) testDrive.textContent = ' ';
            });
