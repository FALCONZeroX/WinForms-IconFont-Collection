<!doctype html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="utf-8">
    <title>General Icons PACK2</title>
    <meta name="description" content="An Icon Font Generated By FALAH FATHEL using IcoMoon.io">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="demo-files/demo.css">
    <link rel="stylesheet" href="style.css">
    <style>
        *{box-sizing:border-box;margin:0}
        body{background:#f4f7fb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:24px}
        .container{max-width:1440px;margin:0 auto}
        .header-card{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:24px;padding:28px 32px;color:#fff;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;box-shadow:0 12px 30px rgba(0,0,0,.15)}
        .header-card h1{font-weight:500;font-size:1.8rem;letter-spacing:-.3px}
        .header-card .badge{background:rgba(255,255,255,.12);padding:6px 18px;border-radius:40px;font-size:.9rem;border:1px solid rgba(255,255,255,.08)}
        .search-section{background:#fff;border-radius:20px;padding:18px 24px;margin:24px 0;display:flex;flex-wrap:wrap;align-items:center;gap:16px;box-shadow:0 4px 12px rgba(0,0,0,.03)}
        .search-section label{font-weight:500;color:#1e293b;display:flex;align-items:center;gap:6px}
        .search-section input[type="text"]{flex:1;min-width:200px;padding:12px 18px;border:1px solid #e2e8f0;border-radius:40px;font-size:1rem;background:#f8fafc;transition:.2s}
        .search-section input[type="text"]:focus{outline:2px solid #3b82f6;background:#fff;border-color:transparent}
        .search-section .count-badge{background:#eef2ff;color:#2563eb;padding:4px 16px;border-radius:40px;font-size:.9rem;font-weight:500}
        .grid-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:20px;margin-top:24px}
        .glyph-card{background:#fff;border-radius:18px;padding:16px 12px 14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.03);border:1px solid #eef2f6;transition:all .15s;display:flex;flex-direction:column;align-items:center}
        .glyph-card:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.06);border-color:#d1d9e6}
        .glyph-card .icon-preview{font-size:42px;line-height:1.2;margin-bottom:8px;color:#0f172a;width:100%;padding:6px 0}
        .glyph-card .icon-name{font-size:.8rem;color:#334155;word-break:break-all;background:#f1f5f9;padding:4px 12px;border-radius:40px;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:450}
        .glyph-card .codepoint{font-size:.7rem;color:#94a3b8;font-family:monospace;background:#f8fafc;padding:2px 10px;border-radius:30px;margin-top:6px;border:1px solid #e9edf2}
        .test-drive-section{background:#fff;border-radius:20px;padding:24px 28px;margin-top:40px;box-shadow:0 4px 12px rgba(0,0,0,.02);border:1px solid #eef2f6}
        .test-drive-section h2{font-size:1.25rem;font-weight:500;color:#0f172a;margin-bottom:16px}
        .test-controls{display:flex;flex-wrap:wrap;gap:18px;align-items:center;margin-bottom:14px}
        .test-controls label{display:flex;align-items:center;gap:8px;color:#1e293b;font-weight:450}
        .test-controls input[type="number"]{width:80px;padding:8px 10px;border:1px solid #e2e8f0;border-radius:30px;background:#f8fafc;font-size:1rem}
        .test-controls input[type="text"]{flex:1;min-width:180px;padding:10px 16px;border:1px solid #e2e8f0;border-radius:40px;background:#f8fafc;font-size:1rem}
        .test-drive-output{font-family:'General_icons2',sans-serif;font-size:48px;min-height:80px;padding:20px 16px;background:#fafcff;border-radius:18px;border:1px dashed #dce3ec;color:#0f172a;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .footer{text-align:center;margin-top:48px;color:#94a3b8;font-size:.85rem;border-top:1px solid #e2e8f0;padding-top:24px}
        .footer a{color:#3b82f6;text-decoration:none}
        .hidden{display:none}
        .highlight{background:#fef9c3;border-radius:4px}
        .no-results{padding:60px 20px;text-align:center;color:#64748b;grid-column:1/-1}
        @media (max-width:640px){.header-card{flex-direction:column;align-items:start;gap:12px}.search-section{flex-direction:column;align-items:stretch}}
    </style>
</head>

<div class="container">

    <div class="header-card">
        <div>
            <h1>🔷 <span style="font-weight:300">General</span> ICONS PACK 2</h1>
            <div style="font-size:.95rem;opacity:.7;margin-top:4px">562 glyphs · icon font</div>
        </div>
        <div class="badge">FALCON</div>
    </div>

    <div class="search-section">
        <label for="searchInput">🔍 <span style="font-weight:400">بحث</span></label>
        <input type="text" id="searchInput" placeholder="ابحث عن أيقونة ..." autocomplete="off">
        <span class="count-badge" id="resultCount">562</span>
    </div>

    <div class="grid-container" id="iconGrid"></div>

    <div class="test-drive-section">
        <h2>🧪 اختبار الخط</h2>
        <div class="test-controls">
            <label>الحجم <input type="number" id="fontSize" min="8" value="48"> px</label>
            <input type="text" id="testText" placeholder="اكتب نصاً ..." value="">
        </div>
        <div class="test-drive-output" id="testDrive">&#xe900;</div>
    </div>

    <div class="footer">
        Generated By <a href="https://github.com/FALCONZeroX" target="_blank">FALAH FATHEL</a>
    </div>
</div>

    const grid = document.getElementById('iconGrid');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    const testDrive = document.getElementById('testDrive');
    const fontSizeInput = document.getElementById('fontSize');
    const testTextInput = document.getElementById('testText');

    function renderIcons(filter = '') {
        const q = filter.toLowerCase().trim();
        let html = '';
        let matched = 0;
        icons.forEach(([name, code]) => {
            const matches = !q || name.includes(q);
            if (matches) {
                matched++;
                html += `
                    <div class="glyph-card" data-name="${name}">
                        <div class="icon-preview">&#x${code};</div>
                        <div class="icon-name">${name}</div>
                        <div class="codepoint">${code}</div>
                    </div>
                `;
            }
        });
        if (matched === 0) {
            html = `<div class="no-results">😕 لا توجد أيقونات تطابق "<strong>${filter}</strong>"</div>`;
        }
        grid.innerHTML = html;
        resultCount.textContent = matched;
    }

    function updateTestDrive() {
        const size = parseInt(fontSizeInput.value, 10) || 48;
        testDrive.style.fontSize = size + 'px';
        const text = testTextInput.value || '';
        if (text.trim() === '') {
            testDrive.innerHTML = '&#xe900;';
        } else {
            testDrive.innerHTML = text;
        }
    }

    searchInput.addEventListener('input', function(e) {
        renderIcons(this.value);
    });

    fontSizeInput.addEventListener('input', updateTestDrive);
    testTextInput.addEventListener('input', updateTestDrive);

    renderIcons();
    updateTestDrive();
})();
