<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Finance Icons</title>
    <meta name="description" content="An Icon Font Generated By FALAH FATHEL using IcoMoon.io">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="demo-files/demo.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1a2332;
        }
        .demo-header {
            background: linear-gradient(135deg, #0b1a33 0%, #1a3355 100%);
            padding: 40px 30px 30px;
            color: #fff;
            border-bottom: 4px solid #2d8cff;
        }
        .demo-header .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }
        .demo-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .demo-header h1 small {
            font-size: 16px;
            font-weight: 400;
            opacity: 0.7;
            margin-left: 12px;
        }
        .demo-header .badge {
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .demo-header .badge span {
            color: #6db3ff;
            font-weight: 600;
        }
        .search-section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 30px 10px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 13px 20px 13px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            background: #fff;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
            color: #1a2332;
        }
        .search-box input:focus {
            border-color: #2d8cff;
            box-shadow: 0 0 0 4px rgba(45, 140, 255, 0.12);
        }
        .search-box .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 20px;
            pointer-events: none;
        }
        .search-box .clear-btn {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            display: none;
            padding: 4px 6px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .search-box .clear-btn:hover {
            background: #f1f4f9;
            color: #475569;
        }
        .search-box .clear-btn.visible {
            display: block;
        }
        .stats {
            font-size: 14px;
            color: #64748b;
            white-space: nowrap;
            background: #fff;
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
        }
        .stats strong {
            color: #0b1a33;
        }
        .icon-grid {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 30px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }
        .icon-card {
            background: #fff;
            border-radius: 14px;
            padding: 20px 12px 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #edf2f7;
            transition: transform 0.2s, box-shadow 0.25s, border-color 0.2s;
            cursor: default;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .icon-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            border-color: #d0dbe8;
        }
        .icon-card .icon-wrap {
            font-size: 36px;
            line-height: 1;
            color: #0b1a33;
            transition: transform 0.2s;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-card:hover .icon-wrap {
            transform: scale(1.08);
        }
        .icon-card .icon-name {
            font-size: 12px;
            color: #64748b;
            word-break: break-all;
            line-height: 1.4;
            max-width: 100%;
            font-weight: 500;
            letter-spacing: 0.01em;
        }
        .icon-card .icon-code {
            font-size: 10px;
            color: #b0bec5;
            font-family: "SF Mono", "Cascadia Code", monospace;
            background: #f1f4f9;
            padding: 2px 10px;
            border-radius: 10px;
            letter-spacing: 0.04em;
        }
        .icon-card.hidden {
            display: none;
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            font-size: 18px;
            background: #fff;
            border-radius: 16px;
            border: 2px dashed #e2e8f0;
        }
        .no-results span {
            display: block;
            font-size: 48px;
            margin-bottom: 16px;
        }
        .test-drive {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px 40px;
        }
        .test-drive .td-box {
            background: #fff;
            border-radius: 16px;
            padding: 28px 32px 32px;
            border: 1px solid #edf2f7;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .test-drive h2 {
            font-size: 18px;
            font-weight: 600;
            color: #0b1a33;
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }
        .test-drive .td-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
        }
        .test-drive .td-row label {
            font-size: 14px;
            color: #475569;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .test-drive .td-row input[type="number"] {
            width: 72px;
            padding: 8px 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
        }
        .test-drive .td-row input[type="number"]:focus {
            border-color: #2d8cff;
            box-shadow: 0 0 0 3px rgba(45, 140, 255, 0.1);
        }
        .test-drive .td-row input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 10px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            color: #1a2332;
        }
        .test-drive .td-row input[type="text"]:focus {
            border-color: #2d8cff;
            box-shadow: 0 0 0 3px rgba(45, 140, 255, 0.1);
        }
        .test-drive .td-preview {
            margin-top: 18px;
            padding: 24px 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 2px dashed #e2e8f0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #0b1a33;
            transition: all 0.2s;
            word-break: break-all;
            text-align: center;
        }
        .test-drive .td-preview .preview-text {
            font-size: 48px;
            font-family: "Finance_icons", sans-serif;
            line-height: 1.2;
        }
        .demo-footer {
            background: #0b1a33;
            padding: 24px 30px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        .demo-footer a {
            color: #6db3ff;
            text-decoration: none;
            font-weight: 500;
        }
        .demo-footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 640px) {
            .demo-header {
                padding: 28px 18px 22px;
            }
            .demo-header h1 {
                font-size: 20px;
            }
            .demo-header h1 small {
                font-size: 13px;
                display: block;
                margin-left: 0;
                margin-top: 4px;
                opacity: 0.6;
            }
            .demo-header .badge {
                font-size: 12px;
                padding: 5px 14px;
                margin-top: 8px;
            }
            .search-section {
                padding: 14px 16px 6px;
                flex-direction: column;
                align-items: stretch;
            }
            .stats {
                text-align: center;
                font-size: 13px;
                padding: 6px 14px;
            }
            .icon-grid {
                padding: 8px 16px 30px;
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 12px;
            }
            .icon-card {
                padding: 16px 8px 12px;
                border-radius: 12px;
            }
            .icon-card .icon-wrap {
                font-size: 30px;
                height: 40px;
            }
            .icon-card .icon-name {
                font-size: 10px;
            }
            .icon-card .icon-code {
                font-size: 9px;
                padding: 1px 8px;
            }
            .test-drive {
                padding: 0 16px 30px;
            }
            .test-drive .td-box {
                padding: 20px 16px 24px;
            }
            .test-drive .td-row {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            .test-drive .td-preview {
                font-size: 32px;
                min-height: 72px;
                padding: 16px;
            }
            .test-drive .td-preview .preview-text {
                font-size: 32px;
            }
        }
        @media (max-width: 400px) {
            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
                gap: 8px;
            }
            .icon-card .icon-wrap {
                font-size: 24px;
                height: 34px;
            }
        }
    </style>
</head>
<body>
<header class="demo-header">
        <div class="container">
            <h1>Finance Icons <small>172 icons</small></h1>
            <div class="badge"><span>FALCON</span></div>
        </div>
    </header>

    <div class="search-section">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search icons..." autofocus>
            <button class="clear-btn" id="clearBtn">✕</button>
        </div>
        <div class="stats" id="statsDisplay">Showing <strong>172</strong> icons</div>
    </div>

    <div class="icon-grid" id="iconGrid"></div>

    <div class="test-drive">
        <div class="td-box">
            <h2>Font Test Drive</h2>
            <div class="td-row">
                <label>Size: <input type="number" id="fontSize" min="8" value="48"> px</label>
                <input type="text" id="testText" placeholder="Type some text to test..." value="">
            </div>
            <div class="td-preview">
                <span class="preview-text" id="testDrive">&#xe900;</span>
            </div>
        </div>
    </div>

    <footer class="demo-footer">
        Generated by <a href="https://github.com/FALCONZeroX">FALAH FATHEL</a>
    </footer>

        var grid = document.getElementById('iconGrid');
        var searchInput = document.getElementById('searchInput');
        var clearBtn = document.getElementById('clearBtn');
        var statsDisplay = document.getElementById('statsDisplay');
        var fontSizeInput = document.getElementById('fontSize');
        var testTextInput = document.getElementById('testText');
        var testDrive = document.getElementById('testDrive');

        function renderIcons(filter) {
            var html = '';
            var count = 0;
            var f = (filter || '').toLowerCase().trim();
            for (var i = 0; i < ICONS.length; i++) {
                var name = ICONS[i][0];
                var code = ICONS[i][1];
                var show = !f || name.indexOf(f) !== -1;
                if (show) count++;
                var cls = 'icon-card' + (show ? '' : ' hidden');
                html += '<div class="' + cls + '">';
                html += '<div class="icon-wrap"><span class="icon-' + name + '"></span></div>';
                html += '<div class="icon-name">icon-' + name + '</div>';
                html += '<div class="icon-code">' + code + '</div>';
                html += '</div>';
            }
            if (count === 0) {
                html += '<div class="no-results"><span>🔍</span>No icons found for "' + filter + '"</div>';
            }
            grid.innerHTML = html;
            statsDisplay.innerHTML = 'Showing <strong>' + count + '</strong> icon' + (count !== 1 ? 's' : '');
            return count;
        }

        function updateTestDrive() {
            var size = parseInt(fontSizeInput.value, 10) || 48;
            var txt = testTextInput.value || '&#xe900;';
            testDrive.style.fontSize = size + 'px';
            testDrive.innerHTML = txt;
        }

        searchInput.addEventListener('input', function() {
            var val = this.value;
            if (val.length > 0) {
                clearBtn.classList.add('visible');
            } else {
                clearBtn.classList.remove('visible');
            }
            renderIcons(val);
        });

        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            clearBtn.classList.remove('visible');
            renderIcons('');
            searchInput.focus();
        });

        fontSizeInput.addEventListener('input', updateTestDrive);
        testTextInput.addEventListener('input', updateTestDrive);

        renderIcons('');
        updateTestDrive();
    </script>
