    <style>
        * { box-sizing: border-box; margin: 0; }
        body { background: #f4f6fa; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 24px; }
        .container { max-width: 1440px; margin: 0 auto; background: #fff; border-radius: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.04); padding: 32px 28px; }
        .toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 32px; gap: 16px; }
        .toolbar h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.3px; color: #0b1a33; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
        .toolbar h1 small { font-weight: 400; font-size: 16px; color: #5e6f8d; }
        .search-box { position: relative; flex: 1; min-width: 220px; max-width: 380px; }
        .search-box input { width: 100%; padding: 12px 18px 12px 48px; border: 1px solid #d9e0eb; border-radius: 60px; font-size: 15px; background: #f8faff; transition: 0.2s; outline: none; }
        .search-box input:focus { border-color: #2a6bf0; background: #fff; box-shadow: 0 0 0 4px rgba(42,107,240,0.08); }
        .search-box .icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #7a8aa5; font-size: 18px; }
        .grid-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #eef2f7; }
        .grid-header span { color: #2b3a5a; font-weight: 500; font-size: 14px; background: #eef2f7; padding: 4px 14px; border-radius: 40px; }
        .glyph-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
        .glyph-card { background: #ffffff; border-radius: 18px; padding: 18px 10px 14px; text-align: center; transition: 0.15s; border: 1px solid #edf2f9; box-shadow: 0 2px 6px rgba(0,0,0,0.01); display: flex; flex-direction: column; align-items: center; }
        .glyph-card:hover { border-color: #b7c9e0; background: #fafcff; box-shadow: 0 6px 14px rgba(0,20,50,0.04); transform: translateY(-2px); }
        .glyph-card .icon-box { font-size: 30px; line-height: 1.2; margin-bottom: 8px; color: #0f1e3a; }
        .glyph-card .icon-name { font-size: 12px; color: #2e405e; font-weight: 450; word-break: break-word; max-width: 100%; }
        .glyph-card .codepoint { font-size: 11px; color: #7a8aa5; background: #f0f4fc; padding: 2px 12px; border-radius: 40px; margin-top: 6px; font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: 0.2px; }
        .test-drive { margin-top: 48px; padding-top: 28px; border-top: 1px solid #e6ecf5; }
        .test-drive label { font-weight: 500; color: #1f324f; margin-right: 16px; font-size: 14px; }
        .test-drive input[type="number"] { width: 80px; padding: 8px 12px; border: 1px solid #d0dae8; border-radius: 40px; text-align: center; font-size: 14px; background: #f9fcff; }
        .test-drive input[type="text"] { width: 100%; max-width: 400px; padding: 12px 20px; border: 1px solid #d0dae8; border-radius: 60px; font-size: 15px; margin: 12px 0 16px; background: #f9fcff; }
        .test-drive .preview { font-size: 48px; padding: 24px 20px; background: #f6f9ff; border-radius: 24px; border: 1px solid #e4ebf5; min-height: 90px; color: #11213a; }
        .footer { margin-top: 40px; font-size: 13px; color: #6a7b99; text-align: center; border-top: 1px solid #eef2f7; padding-top: 22px; }
        .footer a { color: #2a6bf0; text-decoration: none; font-weight: 500; }
        .hidden { display: none; }
        .flex { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
        @media (max-width: 600px) { .container { padding: 20px 14px; } .toolbar { flex-direction: column; align-items: stretch; } .search-box { max-width: 100%; } }
    </style>
</head>

    const container = document.getElementById('glyphContainer');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    const testDrive = document.getElementById('testDrive');
    const fontSizeInput = document.getElementById('fontSize');
    const testTextInput = document.getElementById('testText');

    function renderGlyphs(filter = '') {
        const q = filter.trim().toLowerCase();
        let filtered = glyphs;
        if (q) {
            filtered = glyphs.filter(g => 
                g.name.toLowerCase().includes(q) || 
                g.code.includes(q)
            );
        }
        resultCount.textContent = filtered.length + ' icon' + (filtered.length !== 1 ? 's' : '');
        container.innerHTML = filtered.map(g => `
            <div class="glyph-card">
                <div class="icon-box icon-${g.name}"></div>
                <div class="icon-name">icon-${g.name}</div>
                <div class="codepoint">${g.code}</div>
            </div>
        `).join('');
    }

    function updateTestDrive() {
        const size = parseInt(fontSizeInput.value, 10) || 48;
        const txt = testTextInput.value || '';
        testDrive.style.fontSize = size + 'px';
        testDrive.textContent = txt || '\u00A0';
    }

    searchInput.addEventListener('input', function() {
        renderGlyphs(this.value);
    });

    fontSizeInput.addEventListener('input', updateTestDrive);
    testTextInput.addEventListener('input', updateTestDrive);

    renderGlyphs();
    updateTestDrive();
})();
</script>
</body>
</html>
