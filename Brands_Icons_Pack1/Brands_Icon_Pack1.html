<script>

const container = document.getElementById('iconsContainer');
const noResults = document.getElementById('noResults');
const searchInput = document.getElementById('searchInput');

function renderIcons(filter = '') {
    const query = filter.toLowerCase().trim();
    let hasVisible = false;
    let html = '';

    icons.forEach(icon => {
        const name = icon.name;
        const code = icon.code;
        const displayName = name.replace('icon-', '');
        const match = displayName.toLowerCase().includes(query) || name.toLowerCase().includes(query);
        const hiddenClass = match ? '' : 'hidden';

        if (match) hasVisible = true;

        html += `
            <div class="icon-card ${hiddenClass}">
                <span class="icon ${name}"></span>
                <div class="name">${displayName}</div>
                <div class="code">${code}</div>
            </div>
        `;
    });

    container.innerHTML = html;
    noResults.style.display = hasVisible ? 'none' : 'block';
}

searchInput.addEventListener('input', function() {
    renderIcons(this.value);
});

renderIcons();
</script>
