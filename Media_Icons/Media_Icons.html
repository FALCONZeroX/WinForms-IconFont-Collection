    <title>Media Icons - Live Search</title>

        * {

            margin: 0;
        }
        body {

            color: #1e293b;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header-card {
            background: white;
            padding: 1.8rem 2rem;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 6px rgba(0,0,0,0.03);
            margin-bottom: 2.5rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #edf2f7;
        }
        .header-card h1 {
            font-weight: 600;
            font-size: 1.7rem;
            letter-spacing: -0.02em;
            display: flex;
            align-items: baseline;
            gap: 0.4rem;
            flex-wrap: wrap;
        }
        .header-card h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #64748b;
            margin-left: 0.25rem;
        }
        .search-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            padding: 0.4rem 1rem 0.4rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            transition: all 0.15s;
            min-width: 220px;
        }
        .search-box:focus-within {
            background: white;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .search-box input {
            border: none;
            background: transparent;
            padding: 0.7rem 0;
            font-size: 0.95rem;
            width: 100%;
            outline: none;
            color: #0f172a;
        }
        .search-box input::placeholder {
            color: #94a3b8;
        }
        .search-box svg {
            opacity: 0.5;
            margin-right: 0.5rem;
            color: #475569;
        }
        .grid-wrapper {
            background: white;
            border-radius: 28px;
            padding: 1.8rem 1.5rem 2rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7;
        }
        .glyph-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.75rem;
        }
        .glyph-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 0.5rem 0.9rem;
            background: #fafcff;
            border-radius: 18px;
            transition: all 0.1s ease;
            border: 1px solid #f1f5f9;
            cursor: default;
            text-align: center;
        }
        .glyph-card:hover {
            background: #f1f5f9;
            border-color: #d1d9e6;
            transform: translateY(-1px);
        }
        .glyph-card .icon {
            font-size: 2rem;
            line-height: 1.2;
            color: #0f172a;
            margin-bottom: 0.3rem;
        }
        .glyph-card .label {
            font-size: 0.7rem;
            font-weight: 500;
            color: #334155;
            letter-spacing: 0.01em;
            word-break: break-word;
            max-width: 100%;
            line-height: 1.3;
            background: #eef2f6;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
            margin-top: 0.2rem;
            font-family: "SF Mono", "Menlo", monospace;
        }
        .glyph-card .code {
            font-size: 0.6rem;
            color: #64748b;
            margin-top: 0.15rem;
            font-family: monospace;
            background: #e9edf2;
            padding: 0.1rem 0.6rem;
            border-radius: 20px;
        }
        .no-results {
            grid-column: 1 / -1;
            padding: 3.5rem 1rem;
            text-align: center;
            color: #64748b;
            font-weight: 450;
            background: #f8fafc;
            border-radius: 40px;
            border: 1px dashed #d1d9e6;
        }
        .test-drive {
            margin-top: 2.4rem;
            padding-top: 1.8rem;
            border-top: 1px solid #e9edf2;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1.2rem 2rem;
        }
        .test-drive label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 450;
            color: #1e293b;
        }
        .test-drive input[type="number"] {
            width: 70px;
            padding: 0.4rem 0.3rem;
            border: 1px solid #d1d9e6;
            border-radius: 30px;
            text-align: center;
            font-size: 0.9rem;
            background: white;
        }
        .test-drive input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 0.6rem 1.2rem;
            border: 1px solid #d1d9e6;
            border-radius: 40px;
            font-size: 0.95rem;
            background: white;
            outline: none;
            transition: 0.1s;
        }
        .test-drive input[type="text"]:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .test-preview {
            font-size: 2.6rem;
            padding: 0.3rem 0.8rem;
            background: #f1f5f9;
            border-radius: 60px;
            min-width: 90px;
            text-align: center;
            color: #0f172a;
            font-family: "Media_icons", sans-serif;
            letter-spacing: 0.02em;
            line-height: 1.4;
            border: 1px solid #e2e8f0;
        }
        .footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            padding-top: 2rem;
        }
        .footer a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
        }
        .badge-count {
            background: #e9edf2;
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 450;
            color: #1e293b;
            margin-left: 0.5rem;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .header-card { flex-direction: column; align-items: stretch; gap: 1rem; }
            .search-box { width: 100%; }
            .glyph-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .test-drive { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>

        const grid = document.getElementById('glyphGrid');
        const searchInput = document.getElementById('searchInput');
        const totalSpan = document.getElementById('totalCount');
        const visibleSpan = document.getElementById('visibleCount');

        // Render function
        function render(filter = '') {
            const lower = filter.toLowerCase().trim();
            let visible = 0;
            let html = '';
            for (const g of glyphs) {
                const match = !lower || g.class.toLowerCase().includes(lower);
                if (match) visible++;
                const display = match ? 'block' : 'none';
                html += `
                    <div class="glyph-card" style="display:${display};" data-class="${g.class}">
                        <div class="icon ${g.class}"></div>
                        <div class="label">${g.class}</div>
                        <div class="code">${g.code}</div>
                    </div>
                `;
            }
            if (visible === 0) {
                html += `<div class="no-results">✧ No icons found for “${filter.trim() || '...'}”</div>`;
            }
            grid.innerHTML = html;
            visibleSpan.textContent = visible;
            // Update test drive
            const preview = document.getElementById('testDrive');
            if (preview) {
                const val = document.getElementById('testText').value || ' ';
                preview.textContent = val;
            }
        }

        // Initial render
        render('');

        // Search listener
        searchInput.addEventListener('input', function() {
            render(this.value);
        });

        // Test drive: font size & text
        const fontSizeInput = document.getElementById('fontSize');
        const testTextInput = document.getElementById('testText');
        const testDrive = document.getElementById('testDrive');

        function updateTestDrive() {
            const size = parseInt(fontSizeInput.value, 10) || 48;
            const text = testTextInput.value || ' ';
            testDrive.style.fontSize = size + 'px';
            testDrive.textContent = text;
        }

        fontSizeInput.addEventListener('input', updateTestDrive);
        testTextInput.addEventListener('input', updateTestDrive);
        updateTestDrive();

        // total count
        totalSpan.textContent = glyphs.length;
        visibleSpan.textContent = glyphs.length;
    })();
