<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Devices Icons</title>
    <meta name="description" content="An Icon Font Generated By FALAH FATHEL using IcoMoon.io">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="demo-files/demo.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f7fb;
            color: #1a1a2e;
            line-height: 1.6;
        }
        .app-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 32px 20px 28px;
            text-align: center;
            border-bottom: 4px solid #e94560;
        }
        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .app-header h1 small {
            font-size: 16px;
            font-weight: 400;
            color: #a8b2d1;
            margin-left: 12px;
        }
        .app-header .sub {
            color: #8892b0;
            font-size: 14px;
            margin-top: 6px;
        }
        .app-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }
        .search-section {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 28px;
            background: #fff;
            border-radius: 12px;
            padding: 16px 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            border: 1px solid #e8ecf4;
        }
        .search-section label {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .search-section label svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #4a5568;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .search-input-wrap {
            flex: 1;
            min-width: 200px;
            position: relative;
        }
        .search-input-wrap input {
            width: 100%;
            padding: 10px 16px 10px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            background: #f8fafc;
            transition: all 0.25s ease;
            outline: none;
            color: #1a1a2e;
        }
        .search-input-wrap input:focus {
            border-color: #0f3460;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.08);
        }
        .search-input-wrap .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8892b0;
            pointer-events: none;
        }
        .search-input-wrap .search-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #8892b0;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .stats-badge {
            font-size: 14px;
            color: #4a5568;
            background: #f1f4f9;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
        }
        .stats-badge span {
            font-weight: 700;
            color: #0f3460;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
        }
        .icon-card {
            background: #fff;
            border-radius: 12px;
            padding: 18px 10px 14px;
            text-align: center;
            border: 1px solid #e8ecf4;
            transition: all 0.2s ease;
            cursor: default;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .icon-card:hover {
            transform: translateY(-4px);
            border-color: #0f3460;
            box-shadow: 0 8px 24px rgba(15, 52, 96, 0.10);
        }
        .icon-card .icon-preview {
            font-size: 36px;
            line-height: 1.2;
            color: #1a1a2e;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 52px;
            width: 52px;
            border-radius: 50%;
            background: #f1f4f9;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .icon-card:hover .icon-preview {
            transform: scale(1.12);
            background: #e8ecf4;
        }
        .icon-card .icon-name {
            font-size: 12px;
            font-weight: 500;
            color: #2d3748;
            word-break: break-word;
            line-height: 1.3;
            max-width: 100%;
            margin-bottom: 4px;
        }
        .icon-card .icon-unicode {
            font-size: 11px;
            color: #8892b0;
            font-family: "SF Mono", "Menlo", "Monaco", monospace;
            background: #f1f4f9;
            padding: 2px 10px;
            border-radius: 12px;
            letter-spacing: 0.3px;
        }
        .icon-card.hidden {
            display: none;
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            color: #8892b0;
            font-size: 18px;
            background: #fff;
            border-radius: 12px;
            border: 1px dashed #d0d7e6;
        }
        .no-results strong {
            color: #1a1a2e;
        }

        .test-drive-section {
            margin-top: 40px;
            background: #fff;
            border-radius: 12px;
            padding: 28px 30px;
            border: 1px solid #e8ecf4;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }
        .test-drive-section h2 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }
        .test-drive-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 16px 24px;
        }
        .test-drive-row label {
            font-size: 14px;
            font-weight: 500;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .test-drive-row input[type="number"] {
            width: 72px;
            padding: 6px 8px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            outline: none;
            transition: border 0.2s;
            background: #f8fafc;
        }
        .test-drive-row input[type="number"]:focus {
            border-color: #0f3460;
        }
        .test-drive-row input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 8px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
            background: #f8fafc;
            color: #1a1a2e;
        }
        .test-drive-row input[type="text"]:focus {
            border-color: #0f3460;
            background: #fff;
        }
        .test-drive-preview {
            margin-top: 18px;
            padding: 20px 24px;
            background: #f8fafc;
            border-radius: 10px;
            border: 2px dashed #d0d7e6;
            min-height: 80px;
            display: flex;
            align-items: center;
            font-size: 48px;
            color: #1a1a2e;
            transition: all 0.2s;
            font-family: 'Devices_icons', sans-serif;
            word-break: break-all;
        }
        .test-drive-preview:empty::before {
            content: "Type something above to preview";
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            color: #8892b0;
        }

        .app-footer {
            text-align: center;
            padding: 24px 20px 18px;
            background: #f1f4f9;
            margin-top: 40px;
            border-top: 1px solid #e2e8f0;
            font-size: 14px;
            color: #4a5568;
        }
        .app-footer a {
            color: #0f3460;
            text-decoration: none;
            font-weight: 600;
        }
        .app-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .app-header h1 {
                font-size: 22px;
            }
            .app-header h1 small {
                font-size: 14px;
                display: block;
                margin-left: 0;
                margin-top: 4px;
            }
            .search-section {
                flex-direction: column;
                align-items: stretch;
                padding: 14px 16px;
            }
            .search-input-wrap {
                min-width: unset;
            }
            .stats-badge {
                text-align: center;
            }
            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }
            .test-drive-section {
                padding: 18px 16px;
            }
            .test-drive-row {
                flex-direction: column;
                align-items: stretch;
            }
            .test-drive-preview {
                font-size: 36px;
                padding: 14px 16px;
            }
        }
        @media (max-width: 420px) {
            .icon-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 10px;
            }
            .icon-card {
                padding: 12px 6px 10px;
            }
            .icon-card .icon-preview {
                font-size: 28px;
                height: 42px;
                width: 42px;
            }
            .icon-card .icon-name {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
<header class="app-header">
        <h1>
            <span style="color:#e94560;">&#9679;</span> Devices icons
            <small>Glyphs: 192</small>
        </h1>
        <div class="sub">Icon font &bull;</div>
    </header>

    <div class="app-container">

        <div class="search-section">
            <label>
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                Search
            </label>
            <div class="search-input-wrap">
                <span class="search-icon">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </span>
                <input type="text" id="searchInput" placeholder="Filter icons by name..." autofocus>
            </div>
            <span class="stats-badge" id="statsBadge"><span id="visibleCount">192</span> / 192 visible</span>
        </div>

        <div class="icon-grid" id="iconGrid"></div>

        <div class="test-drive-section">
            <h2>Font Test Drive</h2>
            <div class="test-drive-row">
                <label>
                    Font Size:
                    <input type="number" id="fontSize" min="8" value="48"> px
                </label>
                <input type="text" id="testText" placeholder="Type some text to test...">
            </div>
            <div class="test-drive-preview" id="testDrive"></div>
        </div>

    </div>

    <footer class="app-footer">
        Generated by <a href="https://github.com/FALCONZeroX" target="_blank">FALAH FATHEL</a>
    </footer>

    <script src="demo-files/demo.js"></script>

            var searchInput = document.getElementById('searchInput');
            var visibleCountEl = document.getElementById('visibleCount');
            var fontSizeInput = document.getElementById('fontSize');
            var testTextInput = document.getElementById('testText');
            var testDriveEl = document.getElementById('testDrive');

            function renderIcons(filter) {
                var html = '';
                var visible = 0;
                var term = (filter || '').toLowerCase().trim();

                for (var i = 0; i < icons.length; i++) {
                    var name = icons[i][0];
                    var code = icons[i][1];
                    var show = term === '' || name.indexOf(term) !== -1;
                    if (show) visible++;
                    var displayClass = show ? '' : 'hidden';
                    var charEntity = '&#x' + code + ';';
                    html += '<div class="icon-card ' + displayClass + '" data-name="' + name + '">';
                    html += '  <div class="icon-preview">' + charEntity + '</div>';
                    html += '  <div class="icon-name">' + name.replace(/^icon-/, '') + '</div>';
                    html += '  <div class="icon-unicode">' + code + '</div>';
                    html += '</div>';
                }

                if (visible === 0 && term !== '') {
                    html += '<div class="no-results">No icons match <strong>"' + term + '"</strong></div>';
                }

                grid.innerHTML = html;
                visibleCountEl.textContent = visible;
            }

            function filterIcons() {
                var term = searchInput.value;
                renderIcons(term);
            }

            searchInput.addEventListener('input', filterIcons);

            function updateTestDrive() {
                var size = parseInt(fontSizeInput.value, 10) || 48;
                var text = testTextInput.value || '';
                testDriveEl.style.fontSize = size + 'px';
                testDriveEl.textContent = text || '';
            }

            fontSizeInput.addEventListener('input', updateTestDrive);
            testTextInput.addEventListener('input', updateTestDrive);

            renderIcons('');
            updateTestDrive();

        })();
